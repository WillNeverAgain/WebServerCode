<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Example Web App</title>
    <link rel="stylesheet" href="/assets/site.css">
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <p class="eyebrow">Web repository entry</p>
        <h1>网页仓库入口已加载</h1>
        <p class="lead">
          这个页面由 <code>examples/web-repo/server-entry.js</code> 注册。实际部署时，把同样结构放进独立网页仓库，
          再在服务器框架的 <code>config/site.config.json</code> 中配置网页仓库地址。
        </p>
        <div class="actions">
          <a href="/status">查看状态页</a>
          <a href="/_health">健康检查</a>
        </div>
      </section>
    </main>
  </body>
</html>
